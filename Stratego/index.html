<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Stratego</title>
  <link rel="stylesheet" href="stratego.css">
</head>
<body>

<div id="status">🔴</div>

<div class="game">
  <div id="red-graveyard" class="grave"></div>

  <div class="board-with-labels">
    <div class="files top">
      <span></span>
      <span>a</span><span>b</span><span>c</span><span>d</span><span>e</span>
      <span>f</span><span>g</span><span>h</span><span>i</span><span>j</span>
    </div>

    <div class="board-row">
      <div class="ranks left">
        <span>10</span><span>9</span><span>8</span><span>7</span><span>6</span>
        <span>5</span><span>4</span><span>3</span><span>2</span><span>1</span>
      </div>
      <div id="board"></div>
    </div>

    <div class="files bottom">
      <span></span>
      <span>a</span><span>b</span><span>c</span><span>d</span><span>e</span>
      <span>f</span><span>g</span><span>h</span><span>i</span><span>j</span>
    </div>
  </div>

  <div id="blue-graveyard" class="grave"></div>
</div>

<script src='stratego.js'></script>
</body>
</html>
