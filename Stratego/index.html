<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Stratego</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #111;
      color: #eee;
      margin: 16px;
      text-align: center;
    }

    .game {
      display: flex;
      gap: 16px;
      justify-content: center;
      align-items: flex-start;
    }

    .left-side {
      display: flex;
      flex-direction: row;
      align-items: flex-start;
      gap: 12px;
    }

    #status {
      font-size: 2.6rem;
      font-weight: bold;
      min-width: 60px;
      padding-top: 8px;
    }

    .grave {
      width: 190px;
      min-height: 580px;
      background: #222;
      padding: 10px;
      border-radius: 8px;
      border: 1px solid #444;
      display: flex;
      flex-direction: column;
      gap: 3px;
      flex-wrap: wrap;
    }

    .board-with-labels {
      display: inline-block;
    }

    .files.top,
    .files.bottom {
      display: grid;
      grid-template-columns: 38px repeat(10, 58px);
      font-weight: bold;
      font-size: 18px;
      color: #ddd;
      margin: 0;
      text-align: center;
    }

    .files.top    { margin-bottom: 1px; }
    .files.bottom { margin-top:    1px; }

    .board-row {
      display: flex;
      margin: 0;
    }

    .ranks.left,
    .ranks.right {
      display: flex;
      flex-direction: column;
      width: 38px;
      font-weight: bold;
      font-size: 18px;
      color: #ddd;
      text-align: center;
      margin: 0;
      padding: 0 2px;
    }

    .ranks.left  { padding-right: 3px; }
    .ranks.right { padding-left:  3px; }

    .ranks span,
    .files span {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      line-height: 1;
      height: 58px;
      transform: translateY(-1px);
    }

    #board {
      display: grid;
      grid-template-columns: repeat(10, 58px);
      grid-template-rows:    repeat(10, 58px);
      gap: 1px;
      background: #222;
      padding: 6px;
      border: 2px solid #444;
      border-radius: 7px;
      margin: 0;
    }

    .cell {
      width: 58px;
      height: 58px;
      background: #8bc34a;
      border: 1px solid #4caf50;
      border-radius: 4px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      font-weight: bold;
      cursor: pointer;
      user-select: none;
    }

    .cell.lake {
      background: #000;
      border-color: #111;
      cursor: default;
    }

    .red {
      background: #c62828;
      border-color: #b71c1c;
      color: #fff;
    }

    .blue {
      background: #1565c0;
      border-color: #0d47a1;
      color: #fff;
    }

    .piece {
      width: 52px;
      height: 52px;
      line-height: 52px;
      border-radius: 4px;
      font-size: 28px;
      box-shadow: 0 2px 5px #000;
    }

    .selected {
      box-shadow: 0 0 0 3px #ffeb3b, inset 0 0 7px #ffeb3b !important;
    }

    .possible-move {
      background: #ffeb3b !important;
      opacity: 0.70;
    }

    .grave-piece {
      width: 26px;
      height: 26px;
      line-height: 26px;
      font-size: 16px;
      border-radius: 3px;
      border: 1px solid #555;
      display: flex;
      align-items: center;
      justify-content: center;
    }
  </style>
</head>
<body>

<div class="game">
  <div class="left-side">
    <div id="status">🔴</div>
    <div id="red-graveyard" class="grave"></div>
  </div>

  <div class="board-with-labels">
    <div class="files top">
      <span></span>
      <span>a</span><span>b</span><span>c</span><span>d</span><span>e</span>
      <span>f</span><span>g</span><span>h</span><span>i</span><span>j</span>
    </div>

    <div class="board-row">
      <div class="ranks left">
        <span>10</span><span>9</span><span>8</span><span>7</span><span>6</span>
        <span>5</span><span>4</span><span>3</span><span>2</span><span>1</span>
      </div>

      <div id="board"></div>

      <div class="ranks right">
        <span>10</span><span>9</span><span>8</span><span>7</span><span>6</span>
        <span>5</span><span>4</span><span>3</span><span>2</span><span>1</span>
      </div>
    </div>

    <div class="files bottom">
      <span></span>
      <span>a</span><span>b</span><span>c</span><span>d</span><span>e</span>
      <span>f</span><span>g</span><span>h</span><span>i</span><span>j</span>
    </div>
  </div>

  <div id="blue-graveyard" class="grave"></div>
</div>

<script>
// Piece data (r = rank, lower = stronger; m = movable; s = scout)
const PIECES = {
  'B': {name:"Bomb",   r:-1, m:false},
  'F': {name:"Flag",   r:-2, m:false},
  'S': {name:"Spy",    r:999, m:true},
  '9': {name:"Scout",  r:9,   m:true, s:true},
  '8': {name:"Miner",  r:8,   m:true},
  '7': {name:"Sergeant",r:7,   m:true},
  '6': {name:"Lieutenant",r:6, m:true},
  '5': {name:"Captain", r:5,   m:true},
  '4': {name:"Major",   r:4,   m:true},
  '3': {name:"Colonel", r:3,   m:true},
  '2': {name:"General", r:2,   m:true},
  '1': {name:"Marshal", r:1,   m:true}
};

const RED_SETUP = ["1","2","3","3","4","4","4","5","5","5","5","6","6","6","6","7","7","7","7","S","B","B","B","B","B","B","F","8","8","8","9","9","9","9","9","9","9","9","8","8"];
const BLUE_SETUP = ["9","9","9","9","9","9","9","9","8","8","B","B","B","B","B","B","F","8","8","8","5","6","6","6","6","7","7","7","7","S","1","2","3","3","4","4","4","5","5","5"];

const board = Array(100).fill(null);
const redGrave = [], blueGrave = [];
let selected = null;
let currentPlayer = "red";
let gameOver = false;

function idx(r, c) { return r * 10 + c; }
function isLake(r, c) { return (r === 4 || r === 5) && (c === 2 || c === 3 || c === 6 || c === 7); }

function placePieces() {
  let k = 0;
  for (let r = 0; r < 4; r++) {
    for (let c = 0; c < 10; c++) {
      if (!isLake(r, c)) board[idx(r, c)] = {c: "red", t: RED_SETUP[k++]};
    }
  }
  k = 0;
  for (let r = 6; r < 10; r++) {
    for (let c = 0; c < 10; c++) {
      if (!isLake(r, c)) board[idx(r, c)] = {c: "blue", t: BLUE_SETUP[k++]};
    }
  }
}

function pieceHTML(p) {
  if (!p) return "";
  let s = p.t;
  if (p.t === 'B') s = '💣';
  if (p.t === 'F') s = '⚑';
  if (p.t === 'S') s = '🕵️';
  return `<div class="piece ${p.c}">${s}</div>`;
}

function graveHTML(p) {
  let s = p.t;
  if (p.t === 'B') s = '💣';
  if (p.t === 'F') s = '⚑';
  if (p.t === 'S') s = '🕵️';
  return `<div class="grave-piece ${p.c}">${s}</div>`;
}

function render() {
  document.querySelectorAll(".cell").forEach(cell => {
    const i = +cell.dataset.i;
    const p = board[i];
    cell.innerHTML = p ? pieceHTML(p) : "";
    cell.className = "cell" + (isLake(Math.floor(i/10), i%10) ? " lake" : "");
    if (p) cell.classList.add(p.c);
    if (selected === i) cell.classList.add("selected");
  });
  document.getElementById("red-graveyard").innerHTML = redGrave.map(graveHTML).join("");
  document.getElementById("blue-graveyard").innerHTML = blueGrave.map(graveHTML).join("");
  if (!gameOver) {
    document.getElementById("status").textContent = currentPlayer === "red" ? "🔴" : "🔵";
  }
}

function scoutValidPath(from, to) {
  const fr = Math.floor(from/10), fc = from % 10;
  const tr = Math.floor(to/10),   tc = to   % 10;
  if (fr !== tr && fc !== tc) return false;
  const dr = Math.sign(tr - fr);
  const dc = Math.sign(tc - fc);
  let r = fr + dr, c = fc + dc;
  while (r !== tr || c !== tc) {
    if (isLake(r, c) || board[idx(r, c)]) return false;
    r += dr;
    c += dc;
  }
  return true;
}

function isValidMove(fromIdx, toIdx) {
  if (gameOver || isLake(Math.floor(toIdx/10), toIdx%10)) return false;
  const piece = board[fromIdx];
  if (!PIECES[piece.t].m) return false;
  const target = board[toIdx];
  if (target && target.c === piece.c) return false;
  if (PIECES[piece.t].s) return scoutValidPath(fromIdx, toIdx);
  return Math.abs(Math.floor(fromIdx/10) - Math.floor(toIdx/10)) +
         Math.abs(fromIdx%10 - toIdx%10) === 1;
}

function showPossibleMoves(from) {
  document.querySelectorAll(".cell").forEach(cell => {
    if (isValidMove(from, +cell.dataset.i)) {
      cell.classList.add("possible-move");
    }
  });
}

function clearHighlights() {
  document.querySelectorAll(".cell").forEach(c => c.classList.remove("possible-move"));
}

function resolveAttack(attacker, defender) {
  const a = PIECES[attacker.t];
  const d = PIECES[defender.t];

  if (a.name === "Miner" && d.name === "Bomb") return "attacker_wins";
  if (a.name === "Spy" && d.name === "Marshal") return "attacker_wins";
  if (a.r < d.r) return "attacker_wins";
  if (a.r > d.r) return "defender_wins";
  return "both_die";
}

function performMove(from, to) {
  if (gameOver) return;
  const attacker = board[from];
  const defender = board[to];

  if (!defender) {
    board[to] = attacker;
    board[from] = null;
  } else {
    if (defender.t === "F") {
      board[to] = attacker;
      board[from] = null;
      gameOver = true;
      document.getElementById("status").textContent = attacker.c.toUpperCase() + " WINS!";
      clearHighlights();
      render();
      return;
    }

    const result = resolveAttack(attacker, defender);

    if (result === "attacker_wins") {
      board[to] = attacker;
      board[from] = null;
      (defender.c === "red" ? redGrave : blueGrave).push(defender);
    } else if (result === "defender_wins") {
      board[from] = null;
      (attacker.c === "red" ? redGrave : blueGrave).push(attacker);
    } else {
      board[from] = null;
      board[to] = null;
      (attacker.c === "red" ? redGrave : blueGrave).push(attacker);
      (defender.c === "red" ? redGrave : blueGrave).push(defender);
    }
  }

  selected = null;
  clearHighlights();
  render();
  if (!gameOver) currentPlayer = currentPlayer === "red" ? "blue" : "red";
}

function initBoard() {
  const boardEl = document.getElementById("board");
  boardEl.innerHTML = "";
  for (let r = 0; r < 10; r++) {
    for (let c = 0; c < 10; c++) {
      const cell = document.createElement("div");
      cell.className = "cell" + (isLake(r, c) ? " lake" : "");
      cell.dataset.i = idx(r, c);
      cell.onclick = () => {
        const i = +cell.dataset.i;
        const piece = board[i];
        if (selected !== null) {
          if (i === selected) {
            selected = null;
            clearHighlights();
          } else if (piece && piece.c === currentPlayer) {
            selected = i;
            clearHighlights();
            showPossibleMoves(i);
          } else if (isValidMove(selected, i)) {
            performMove(selected, i);
          } else {
            selected = null;
            clearHighlights();
          }
        } else if (piece && piece.c === currentPlayer) {
          selected = i;
          showPossibleMoves(i);
        }
        render();
      };
      boardEl.appendChild(cell);
    }
  }
}

function startGame() {
  board.fill(null);
  redGrave.length = 0;
  blueGrave.length = 0;
  placePieces();
  initBoard();
  render();
}

startGame();
  </script>
</body>
</html>
