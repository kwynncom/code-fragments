<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Stratego</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #111;
      color: #eee;
      margin: 16px;
      text-align: center;
    }

    .game {
      display: flex;
      gap: 16px;
      justify-content: center;
      align-items: flex-start;
    }

    .left-side {
      display: flex;
      flex-direction: row;
      align-items: flex-start;
      gap: 12px;
    }

    #status {
      font-size: 2.6rem;
      font-weight: bold;
      min-width: 60px;
      padding-top: 8px;
    }

    .grave {
      width: 190px;
      min-height: 580px;
      background: #222;
      padding: 10px;
      border-radius: 8px;
      border: 1px solid #444;
      display: flex;
      flex-direction: column;
      gap: 3px;
      flex-wrap: wrap;
    }

    #board-container {
      display: inline-block;
    }

    #board-table {
      border-collapse: collapse;
      margin: 0;
      background: #222;
      border: 2px solid #444;
      border-radius: 7px;
      overflow: hidden;
    }

    #board-table th.label,
    #board-table td.label {
      width: 38px;
      height: 38px;
      font-weight: bold;
      font-size: 18px;
      color: #ddd;
      background: #111;
      text-align: center;
      vertical-align: middle;
      padding: 0;
      margin: 0;
      line-height: 38px;
    }

    #board-table th.file {
      height: 28px;
      font-size: 18px;
      color: #ddd;
      background: #111;
      text-align: center;
      vertical-align: middle;
      padding: 0;
      margin: 0;
    }

    #board-table td.cell {
      width: 58px;
      height: 58px;
      background: #8bc34a;
      border: 1px solid #4caf50;
      text-align: center;
      vertical-align: middle;
      padding: 0;
      margin: 0;
      cursor: pointer;
      user-select: none;
      font-size: 28px;
      font-weight: bold;
    }

    #board-table td.cell.lake {
      background: #000;
      border-color: #111;
      cursor: default;
    }

    .red {
      background: #c62828 !important;
      border-color: #b71c1c !important;
      color: #fff;
    }

    .blue {
      background: #1565c0 !important;
      border-color: #0d47a1 !important;
      color: #fff;
    }

    .piece {
      width: 52px;
      height: 52px;
      line-height: 52px;
      border-radius: 4px;
      font-size: 28px;
      box-shadow: 0 2px 5px #000;
    }

    .selected {
      box-shadow: 0 0 0 3px #ffeb3b, inset 0 0 7px #ffeb3b !important;
    }

    .possible-move {
      background: #ffeb3b !important;
      opacity: 0.70;
    }

    .grave-piece {
      width: 26px;
      height: 26px;
      line-height: 26px;
      font-size: 16px;
      border-radius: 3px;
      border: 1px solid #555;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* Make sure no extra space sneaks in */
    #board-table tr, #board-table td, #board-table th {
      margin: 0 !important;
      padding: 0 !important;
    }
  </style>
</head>
<body>

<div class="game">
  <div class="left-side">
    <div id="status">🔴</div>
    <div id="red-graveyard" class="grave"></div>
  </div>

  <div id="board-container">
    <table id="board-table">
      <thead>
        <tr>
          <th class="file"></th>
          <th class="file">a</th>
          <th class="file">b</th>
          <th class="file">c</th>
          <th class="file">d</th>
          <th class="file">e</th>
          <th class="file">f</th>
          <th class="file">g</th>
          <th class="file">h</th>
          <th class="file">i</th>
          <th class="file">j</th>
        </tr>
      </thead>
      <tbody id="board-body">
        <!-- rows will be inserted by JS -->
      </tbody>
      <tfoot>
        <tr>
          <th class="file"></th>
          <th class="file">a</th>
          <th class="file">b</th>
          <th class="file">c</th>
          <th class="file">d</th>
          <th class="file">e</th>
          <th class="file">f</th>
          <th class="file">g</th>
          <th class="file">h</th>
          <th class="file">i</th>
          <th class="file">j</th>
        </tr>
      </tfoot>
    </table>
  </div>

  <div id="blue-graveyard" class="grave"></div>
</div>

<script src="stratego.js"></script>
</body>
</html>
